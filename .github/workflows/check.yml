name: Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      HLEDGER_VERSION: "1.52.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Install hledger
        run: |
          curl -fL "https://github.com/simonmichael/hledger/releases/download/${HLEDGER_VERSION}/hledger-linux-x64.tar.gz" \
            | sudo tar -xz -f- -C /usr/local/bin hledger
          hledger --version

      - name: Install dependencies
        run: just sync

      - name: Run checks
        run: just check
