name: CI

on:
  push:
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: hledger-elster-linux-x86_64
          - os: macos-latest
            asset_name: hledger-elster-macos-arm64
    runs-on: ${{ matrix.os }}
    env:
      HLEDGER_VERSION: "1.52.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Install cargo-audit and cargo-machete
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-audit,cargo-machete

      - name: Install hledger (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fL "https://github.com/simonmichael/hledger/releases/download/${HLEDGER_VERSION}/hledger-linux-x64.tar.gz" \
            | sudo tar -xz -f- -C /usr/local/bin hledger
          hledger --version

      - name: Install hledger (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install hledger
          hledger --version

      - name: Check formatting
        run: just fmt-check

      - name: Lint
        run: just clippy

      - name: Check for unused dependencies
        run: just machete

      - name: Security audit
        run: just audit

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: just test

      - name: Copy release binary
        run: cp target/release/hledger-elster ${{ matrix.asset_name }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/
          merge-multiple: true

      - name: Get short commit hash
        id: commit
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ steps.commit.outputs.short }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git tag -f latest
          git push origin latest --force
          gh release create latest \
            --title "Latest (rolling)" \
            --notes "Built from commit ${SHORT_SHA} (${GITHUB_SHA})" \
            --prerelease \
            dist/hledger-elster-linux-x86_64 \
            dist/hledger-elster-macos-arm64
