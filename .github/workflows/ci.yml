name: CI

on:
  push:
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: hledger-elster-linux-x86_64
          - os: macos-latest
            asset_name: hledger-elster-macos-arm64
    runs-on: ${{ matrix.os }}
    env:
      HLEDGER_VERSION: "1.52.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Set up just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Install cargo-audit and cargo-machete
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: cargo-audit,cargo-machete

      - name: Install hledger (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fL "https://github.com/simonmichael/hledger/releases/download/${HLEDGER_VERSION}/hledger-linux-x64.tar.gz" \
            | sudo tar -xz -f- -C /usr/local/bin hledger
          hledger --version

      - name: Install hledger (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install hledger
          hledger --version

      - name: Check formatting
        run: just fmt-check

      - name: Lint
        run: just clippy

      - name: Check for unused dependencies
        run: just machete

      - name: Security audit
        run: just audit

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: just test

      - name: Copy release binary
        run: cp target/release/hledger-elster ${{ matrix.asset_name }}

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Get short commit hash
        id: commit
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ steps.commit.outputs.short }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git tag -f latest
          git push origin latest --force
          gh release create latest \
            --title "Latest (rolling)" \
            --notes "Built from commit ${SHORT_SHA} (${GITHUB_SHA})" \
            --prerelease \
            dist/hledger-elster-linux-x86_64 \
            dist/hledger-elster-macos-arm64
